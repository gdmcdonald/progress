<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Progress</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
</head>
<body>
  <main>
    <a href="https://github.com/gdmcdonald/progress" target="_blank" style="float:right" aria-label="GitHub">
      <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <h2>Task Progress</h2>

    <progress id="bar" value="0" max="100"></progress>
    <p id="pct-label">—</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div>
        <label for="done">Done</label>
        <input type="number" id="done" min="0" placeholder="e.g. 23">
      </div>
      <div>
        <label for="total">Total</label>
        <input type="number" id="total" min="0" placeholder="e.g. 85">
      </div>
    </div>

    <button id="btn-inc">+1</button>
    <button id="btn-reset" class="secondary outline">Reset</button>
  </main>

  <script>
    const $ = id => document.getElementById(id);

    function render(done, total) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      $('bar').value = pct;
      $('pct-label').textContent = total > 0
        ? `${done} of ${total} done — ${pct}% (${total - done} remaining)`
        : '—';
    }

    function save() {
      const done  = Math.max(0, +$('done').value  || 0);
      const total = Math.max(0, +$('total').value || 0);
      localStorage.setItem('done', done);
      localStorage.setItem('total', total);
      render(done, total);
    }

    ['done', 'total'].forEach(id => $(id).addEventListener('input', save));

    $('btn-inc').addEventListener('click', () => {
      $('done').value = (+$('done').value || 0) + 1;
      save();
    });

    $('btn-reset').addEventListener('click', () => {
      localStorage.clear();
      $('done').value = $('total').value = '';
      render(0, 0);
    });

    // restore saved state
    const d = +localStorage.getItem('done')  || 0;
    const t = +localStorage.getItem('total') || 0;
    if (d || t) { $('done').value = d; $('total').value = t; render(d, t); }
  </script>
</body>
</html>
